<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Nossos CSS Customizados -->
    <link rel="stylesheet" href="/static/css/components/sidebar.css">
    <link rel="stylesheet" href="/static/css/app.css?v=2">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Débitos</title>
</head>

<body>
    <!-- Container Flex que segura a Sidebar e o Conteúdo lado a lado -->
    <div class="d-flex" id="wrapper">
        
        <!-- Sidebar via Template -->
        {{template "sidebar" .}}
        
        <!-- Page Content -->
        <div id="page-content-wrapper">
            <!-- Navbar de Topo -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm border-bottom">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <h2 class="fs-4 m-0 text-dark">Contas a Pagar</h2>
                    
                    <!-- Botão para disparar o Modal -->
                    <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#modalDebitoAvulso">
                        <i class="bi bi-plus-circle me-1"></i> Novo Pagamento Avulso
                    </button>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4 content">
                
                <!-- Barra de Filtros -->
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-body p-4">
                        <form class="row g-3 align-items-end" id="formFiltroDebitos">
                            <div class="col-md-4">
                                <label for="filtro_fornecedor" class="form-label text-muted fw-bold">Fornecedor</label>
                                <input type="text" class="form-control" id="filtro_fornecedor" placeholder="Nome ou ID do fornecedor">
                            </div>
                            <div class="col-md-3">
                                <label for="filtro_vencimento" class="form-label text-muted fw-bold">Data de Vencimento</label>
                                <input type="date" class="form-control" id="filtro_vencimento">
                            </div>
                            <div class="col-md-3">
                                <label for="filtro_status" class="form-label text-muted fw-bold">Status do Lançamento</label>
                                <select class="form-select" id="filtro_status">
                                    <option value="" selected>Todos</option>
                                    <option value="PENDENTE">Pendente</option>
                                    <option value="PAGO">Pago</option>
                                    <option value="CANCELADO">Cancelado</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-outline-secondary w-100 fw-bold">
                                    <i class="bi bi-search me-1"></i> Filtrar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Tabela de Débitos -->
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover align-middle mb-0 text-center">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th class="text-start">Fornecedor</th>
                                        <th class="text-start">Descrição</th>
                                        <th>Vencimento</th>
                                        <th>Valor (R$)</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabela_debitos_body">
                                    <tr>
                                        <td colspan="7" class="text-muted py-5 text-center" id="loading_resultados">
                                            Carregando...
                                        </td>
                                    </tr>
                                </tbody>
                                <footer>
                                    Total de Débitos: <span id="total_debitos">Carregando...</span>
                                </footer>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Importa os Modais no fim da página para não quebrar o CSS -->
    {{template "modalDebitoAvulso" .}}
    {{template "modalEditarDebito" .}}
    {{template "modalVisualizarDebito" .}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <script type="module" src="/static/js/debitos/main.js"></script>
</body>
</html>
