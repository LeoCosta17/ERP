<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Nossos CSS Customizados -->
    <link rel="stylesheet" href="/static/css/components/sidebar.css">
    <link rel="stylesheet" href="/static/css/app.css">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Fornecedores</title>
</head>

<body>
    <div class="d-flex" id="wrapper">
        
        <!-- Sidebar via Template -->
        {{template "sidebar" .}}
        
        <!-- Page Content -->
        <div id="page-content-wrapper">
            <!-- Navbar de Topo -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm border-bottom">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <h2 class="fs-4 m-0 text-dark">Cadastro de Fornecedores</h2>
                    
                    <!-- Botão para disparar o Modal -->
                    <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#modalFornecedor">
                        <i class="bi bi-plus-circle me-1"></i> Novo Fornecedor
                    </button>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4 content">
                
                <!-- Barra de Filtros -->
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-body p-4">
                        <form class="row g-3 align-items-end" id="formFiltroFornecedores">
                            <div class="col-md-10">
                                <label for="filtro_busca" class="form-label text-muted fw-bold">Buscar Fornecedor</label>
                                <input type="text" class="form-control" id="filtro_busca" placeholder="Razão social ou CNPJ">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-outline-secondary w-100 fw-bold">
                                    <i class="bi bi-search me-1"></i> Filtrar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Tabela de Fornecedores -->
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 text-center">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th class="text-start">Razão Social</th>
                                        <th>CNPJ</th>
                                        <th>E-mail</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabela_fornecedores_body">
                                    <!-- Preenchido via JS -->
                                    <tr>
                                        <td colspan="5" class="text-muted py-5 text-center" id="loading_resultados">
                                            Carregando...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modais -->
    {{template "modalFornecedor" .}}
    {{template "errorModal" .}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <script src="/static/js/fornecedores.js"></script>
</body>
</html>
