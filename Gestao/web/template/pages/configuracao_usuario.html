<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Nossos CSS Customizados -->
    <link rel="stylesheet" href="/static/css/components/sidebar.css">
    <link rel="stylesheet" href="/static/css/app.css?v=2">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Minha Conta</title>
</head>
<body>
    <div class="d-flex" id="wrapper">
        {{template "sidebar" .}}
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm border-bottom">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <h2 class="fs-4 m-0 text-dark">Configurações da Conta</h2>
                </div>
            </nav>
            <div class="container-fluid px-4 py-4 content">
                <div class="row gy-4 justify-content-center">

                    <!-- Card de Informações Pessoais -->
                    <div class="col-lg-8 col-xl-6">
                        <div class="card shadow-sm border-0 rounded-4 h-100">
                            <div class="card-header bg-white py-3 border-0">
                                <h5 class="mb-0 fw-bold text-dark">
                                    <i class="bi bi-person-circle me-2 text-primary"></i>
                                    Informações Pessoais
                                </h5>
                            </div>
                            <div class="card-body p-4">
                                <form id="formInfoPessoais">
                                    <div class="row g-3">
                                        <div class="col-12">
                                            <label for="nome" class="form-label">Nome</label>
                                            <input type="text" class="form-control" id="nome" placeholder="Carregando...">
                                        </div>
                                        <div class="col-12">
                                            <label for="email" class="form-label">Email</label>
                                            <input type="email" class="form-control" id="email" placeholder="Carregando..." readonly disabled>
                                        </div>
                                        <div class="col-12">
                                            <label for="telefone" class="form-label">Telefone</label>
                                            <input type="tel" class="form-control" id="telefone" placeholder="(99) 99999-9999">
                                        </div>
                                    </div>
                                    <div class="text-end mt-4">
                                        <button type="submit" class="btn btn-primary fw-bold px-4">Salvar Alterações</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Card de Alteração de Senha -->
                    <div class="col-lg-8 col-xl-6">
                        <div class="card shadow-sm border-0 rounded-4 h-100">
                            <div class="card-header bg-white py-3 border-0">
                                <h5 class="mb-0 fw-bold text-dark">
                                    <i class="bi bi-key-fill me-2 text-primary"></i>
                                    Alterar Senha
                                </h5>
                            </div>
                            <div class="card-body p-4">
                                <form id="formAlterarSenha">
                                    <div class="row g-3">
                                        <div class="col-12">
                                            <label for="currentPassword" class="form-label">Senha Atual</label>
                                            <input type="password" class="form-control" id="currentPassword" placeholder="••••••••">
                                        </div>
                                        <div class="col-12">
                                            <label for="newPassword" class="form-label">Nova Senha</label>
                                            <input type="password" class="form-control" id="newPassword" placeholder="••••••••">
                                        </div>
                                        <div class="col-12">
                                            <label for="confirmPassword" class="form-label">Confirmar Nova Senha</label>
                                            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••">
                                        </div>
                                    </div>
                                    <div class="text-end mt-4">
                                        <button type="submit" class="btn btn-primary fw-bold px-4">Alterar Senha</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/static/js/configuracao_usuario/main.js"></script>
</body>
</html>
