{{define "loginForm"}}
<form>
    <div class="mb-3">
        <label for="entrada_email" class="form-label">Email</label>
        <input type="email" class="form-control" id="entrada_email">
    </div>
    <div class="mb-3">
        <label for="entrada_senha" class="form-label">Senha</label>
        <input type="password" class="form-control" id="entrada_senha">
    </div>
    <button type="submit" class="btn btn-primary">Entrar</button>
</form>
{{end}}
