{{define "sidebar"}}
<div class="sidebar" id="sidebar-wrapper">
    <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom border-secondary">
        ERP Gestão
    </div>
    <div class="list-group list-group-flush my-3">
        <a href="/dashboard" class="list-group-item list-group-item-action bg-transparent fw-bold">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
        <a href="#financeiroMenu" data-bs-toggle="collapse"
            class="list-group-item list-group-item-action bg-transparent fw-bold dropdown-toggle">
            <i class="bi bi-bank me-2"></i> Financeiro
        </a>
        <div class="collapse" id="financeiroMenu">
            <a href="/debitos" class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-cash-coin me-2"></i> Contas a Pagar
            </a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-graph-up-arrow me-2"></i> Contas a Receber
            </a>
        </div>
        <a href="#cadastrosMenu" data-bs-toggle="collapse"
            class="list-group-item list-group-item-action bg-transparent fw-bold dropdown-toggle">
            <i class="bi bi-card-list me-2"></i> Cadastros
        </a>
        <div class="collapse" id="cadastrosMenu">
            <a href="/clientes" class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-people me-2"></i> Clientes
            </a>
            <a href="/fornecedores"
                class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-truck me-2"></i> Fornecedores
            </a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-box me-2"></i> Produtos
            </a>
        </div>
        <a href="#configuracoesMenu" data-bs-toggle="collapse"
            class="list-group-item list-group-item-action bg-transparent fw-bold dropdown-toggle">
            <i class="bi bi-gear me-2"></i> Configurações
        </a>
        <div class="collapse" id="configuracoesMenu">
            <a href="/categorias-debito"
                class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-tags me-2"></i> Categorias de Débitos
            </a>
            <a href="/configuracao-usuario"
                class="list-group-item list-group-item-action bg-transparent ps-5 fw-semibold border-0">
                <i class="bi bi-gear me-2"></i> Configuração do Usuário
            </a>
        </div>
        <a href="/logout" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold mt-5">
            <i class="bi bi-box-arrow-left me-2"></i> Sair
        </a>

</div>
