version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao_api
    ports:
      - "9000:9000"
    environment:
      - API_ADDR=9000
      - DB_CONNECTION_STRING=user=postgres password=postgres dbname=ecommerce host=db port=5432 sslmode=disable
      - JWT_KEY=jAMpmhad2vjwtyx951CptwFsQ5vYeYOw6hCzgL0gXpsJe49BrOfYT2IfCe4MgtSy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gestao_network

  db:
    image: postgres:15-alpine
    container_name: gestao_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gestao_network

networks:
  gestao_network:
    driver: bridge

volumes:
  postgres_data:
