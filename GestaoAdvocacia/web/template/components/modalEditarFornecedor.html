{{define "modalEditarFornecedor"}}
<div class="modal fade" id="modalEditarFornecedor" tabindex="-1" aria-labelledby="modalEditarFornecedorLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalEditarFornecedorLabel">
                    <i class="bi bi-pencil-square me-2"></i> Editar Fornecedor
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="formEditarFornecedor">
                <input type="hidden" id="edit_fornecedor_id">
                <div class="modal-body p-4">
                    <!-- Nav Tabs -->
                    <ul class="nav nav-tabs mb-3" id="editFornecedorTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" id="basico-tab" data-bs-toggle="tab" data-bs-target="#basico" type="button" role="tab" aria-controls="basico" aria-selected="true">Dados Básicos</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="enderecos-tab" data-bs-toggle="tab" data-bs-target="#enderecos" type="button" role="tab" aria-controls="enderecos" aria-selected="false">Endereços</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="telefones-tab" data-bs-toggle="tab" data-bs-target="#telefones" type="button" role="tab" aria-controls="telefones" aria-selected="false">Telefones</button>
                        </li>
                    </ul>

                    <!-- Tab Content -->
                    <div class="tab-content" id="editFornecedorTabsContent">
                        
                        <!-- Dados Básicos Tab -->
                        <div class="tab-pane fade show active" id="basico" role="tabpanel" aria-labelledby="basico-tab">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="edit_fornecedor_razao_social" class="form-label fw-semibold">Razão Social *</label>
                                    <input type="text" class="form-control" id="edit_fornecedor_razao_social" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="edit_fornecedor_cnpj" class="form-label fw-semibold">CNPJ *</label>
                                    <input type="text" class="form-control" id="edit_fornecedor_cnpj" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="edit_fornecedor_inscricao_estadual" class="form-label fw-semibold">Inscrição Estadual</label>
                                    <input type="text" class="form-control" id="edit_fornecedor_inscricao_estadual">
                                </div>
                                <div class="col-md-12">
                                    <label for="edit_fornecedor_email" class="form-label fw-semibold">E-mail de Contato *</label>
                                    <input type="email" class="form-control" id="edit_fornecedor_email" required>
                                </div>
                            </div>
                        </div>

                        <!-- Endereços Tab -->
                        <div class="tab-pane fade" id="enderecos" role="tabpanel" aria-labelledby="enderecos-tab">
                            <div id="containerEnderecos">
                                <!-- Endereços serão inseridos aqui dinamicamente -->
                            </div>
                            <button type="button" class="btn btn-outline-primary btn-sm mt-3 fw-bold" id="btnAddEndereco">
                                <i class="bi bi-plus-circle"></i> Adicionar Endereço
                            </button>
                        </div>

                        <!-- Telefones Tab -->
                        <div class="tab-pane fade" id="telefones" role="tabpanel" aria-labelledby="telefones-tab">
                            <div id="containerTelefones">
                                <!-- Telefones serão inseridos aqui dinamicamente -->
                            </div>
                            <button type="button" class="btn btn-outline-primary btn-sm mt-3 fw-bold" id="btnAddTelefone">
                                <i class="bi bi-plus-circle"></i> Adicionar Telefone
                            </button>
                        </div>

                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}
