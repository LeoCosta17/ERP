{{define "modalEditarDebito"}}
<!-- Modal Editar Débito -->
<div class="modal fade" id="modalEditarDebito" tabindex="-1" aria-labelledby="modalEditarDebitoLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalEditarDebitoLabel">Editar Débito</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="formEditarDebito">
          <input type="hidden" id="edit_id_debito">
          <div class="row mb-3">
            <div class="col-md-6">
              <label for="edit_id_fornecedor" class="form-label">Fornecedor *</label>
              <select class="form-select" id="edit_id_fornecedor" required>
                  <option value="" selected disabled>Carregando fornecedores...</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="edit_id_categoria" class="form-label">Categoria</label>
              <select class="form-select" id="edit_id_categoria">
                  <option value="" selected>Sem Categoria (Opcional)</option>
              </select>
            </div>
          </div>
          
          <div class="mb-3">
            <label for="edit_descricao" class="form-label">Descrição *</label>
            <input type="text" class="form-control" id="edit_descricao" placeholder="Ex: Conta de Luz" required>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="edit_nr_documento" class="form-label">Nº Documento</label>
              <input type="text" class="form-control" id="edit_nr_documento" placeholder="Número do boleto ou doc">
            </div>
            <div class="col-md-6">
              <label for="edit_nr_nota_fiscal" class="form-label">Nº Nota Fiscal</label>
              <input type="text" class="form-control" id="edit_nr_nota_fiscal" placeholder="Série e número da NFe">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label for="edit_valor" class="form-label">Valor (R$) *</label>
              <input type="number" step="0.01" class="form-control" id="edit_valor" placeholder="0.00" required>
            </div>
            <div class="col-md-4">
              <label for="edit_dt_entrada" class="form-label">Data de Entrada *</label>
              <input type="date" class="form-control" id="edit_dt_entrada" required>
            </div>
            <div class="col-md-4">
              <label for="edit_dt_vencimento" class="form-label">Data de Vencimento *</label>
              <input type="date" class="form-control" id="edit_dt_vencimento" required>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="edit_nr_parcela" class="form-label">Nº Parcela *</label>
              <input type="number" class="form-control" id="edit_nr_parcela" value="1" min="1" required>
            </div>
            <div class="col-md-6">
              <label for="edit_nr_total_parcelas" class="form-label">Total de Parcelas *</label>
              <input type="number" class="form-control" id="edit_nr_total_parcelas" value="1" min="1" required>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" form="formEditarDebito" class="btn btn-warning fw-bold text-dark">Salvar Alterações</button>
      </div>
    </div>
  </div>
</div>
{{end}}
