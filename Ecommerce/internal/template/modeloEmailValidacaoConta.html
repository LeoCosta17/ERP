<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ative sua conta</title>
    <style>
        /* Reset padrão para e-mails */
        body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        table {
            border-collapse: collapse;
        }
        /* Container Principal (Card) */
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f8fafc;
            padding: 40px 20px;
        }
        .card {
            max-width: 520px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 40px;
        }
        /* Tipografia */
        h2 {
            color: #0f172a;
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        p {
            color: #475569;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 0;
            margin-bottom: 24px;
        }
        /* Botão de Ação Moderno */
        .btn-container {
            margin-bottom: 28px;
        }
        .btn {
            display: inline-block;
            background-color: #2563eb; /* Azul moderno, estilo Tailwind */
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            text-align: center;
            transition: background-color 0.2s ease;
        }
        /* Notas e Links de Fallback */
        .fallback-text {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
            word-break: break-all;
            margin-top: 32px;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }
        .fallback-link {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h2>Olá, {{.Nome}}! 👋</h2>
            
            <p>Obrigado por se cadastrar! Para garantir a segurança da sua conta e liberar seu acesso completo à plataforma, precisamos apenas que confirme seu endereço de e-mail.</p>
            
            <div class="btn-container">
                <!-- Link aponta para o seu Frontend com o Token dinâmico do Go -->
                <a href="http://localhost:8080/ativacao/usuario?token={{.Token}}" class="btn" target="_blank">
                    Verificar meu e-mail
                </a>
            </div>
            
            <p style="font-size: 14px; color: #64748b; margin-bottom: 0;">
                ⏱️ Este link é válido por <strong>10 minutos</strong>.
            </p>
        </div>
    </div>
</body>
</html>
